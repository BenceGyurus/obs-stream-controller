<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="saving-indicator" class="fade" data-translate="saving">Saving Changes...</div>

    <div class="container">
        <header class="d-flex justify-content-between align-items-center mb-5 fade-in">
            <div>
                <h1 data-translate="app_title">Stream Monitor</h1>
                <p class="text-dim mb-0">YouTube Live Watchdog</p>
            </div>
            <select id="language-switcher" class="form-select form-select-sm bg-transparent text-light border-0 w-auto fw-bold">
                <option value="en">English</option>
                <option value="hu">Magyar</option>
            </select>
        </header>

        <!-- Status Hero -->
        <section class="status-hero fade-in">
            <div id="status-badge" class="status-indicator status-offline">
                <div class="pulse-dot"></div>
                <span id="youtube-status" data-translate="status_offline">Offline</span>
            </div>
            <div class="mt-3">
                <span class="label" data-translate="last_check">Last Check</span>
                <div id="last-check" class="h4 fw-bold">--</div>
            </div>
        </section>

        <div class="dashboard-grid">
            <!-- Analytics Card -->
            <div class="glass-card fade-in" style="grid-column: 1 / -1; animation-delay: 0.1s;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="label" data-translate="history">Live History</span>
                    <div class="small text-dim">
                        <span data-translate="next_check">Next:</span> <span id="next-check-countdown" class="font-monospace text-light">--:--</span>
                    </div>
                </div>
                <div class="chart-container" style="height: 200px;">
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="text-center mt-4">
                    <button id="check-now-btn" class="btn btn-primary px-5" data-translate="check_now">Force Refresh</button>
                </div>
            </div>

            <!-- YouTube Settings -->
            <div class="glass-card fade-in" style="animation-delay: 0.2s;">
                <h5 class="fw-bold mb-4" data-translate="youtube_settings">System Config</h5>
                <div class="mb-4">
                    <div class="label" data-translate="api_key">YouTube API Key</div>
                    <input type="password" class="form-control" id="youtube-api-key" placeholder="••••••••••••••••">
                </div>
                <div class="mb-4">
                    <div class="label" data-translate="channel_id">Channel ID</div>
                    <input type="text" class="form-control" id="youtube-channel-id" placeholder="UC...">
                </div>
                <div class="mb-0">
                    <div class="label" data-translate="check_interval">Check Frequency (s)</div>
                    <input type="number" class="form-control" id="check-interval" min="10" step="10">
                </div>
            </div>

            <!-- Telegram Settings -->
            <div class="glass-card fade-in" style="animation-delay: 0.3s;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0" data-translate="telegram_alerts">Alerts</h5>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="telegram-enabled">
                    </div>
                </div>
                <div class="mb-4">
                    <div class="label" data-translate="bot_token">Bot Token</div>
                    <input type="password" class="form-control" id="telegram-bot-token" placeholder="71234...">
                </div>
                <div class="mb-4">
                    <div class="label" data-translate="chat_id">Chat ID</div>
                    <input type="text" class="form-control" id="telegram-chat-id" placeholder="-100...">
                </div>
                <div class="d-flex justify-content-between align-items-center gap-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="telegram-notify-status">
                        <label class="form-check-label small text-dim" for="telegram-notify-status" data-translate="notify_status_change">Auto-Notify</label>
                    </div>
                    <button id="telegram-test-btn" class="btn btn-outline-info btn-sm px-4 fw-bold" data-translate="send_test">Test</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
